{% extends "base.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center">
    <div class="bg-white p-10 rounded-xl shadow-lg border border-gray-100 max-w-md w-full">
        <div class="mb-6 flex justify-center">
            <div class="bg-red-50 p-4 rounded-full">
                <svg class="h-12 w-12 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
            </div>
        </div>
        <h2 class="text-3xl font-extrabold text-gray-900 mb-4">403 Forbidden</h2>
        <p class="text-gray-600 mb-8 leading-relaxed">
            You are not authorized to access this page. This action has been logged for security monitoring.
        </p>
        <div class="space-y-4">
            <a href="{% url 'dashboard' %}" class="block w-full py-3 px-4 bg-primary text-white font-bold rounded-lg hover:bg-primary-dark transition-all">
                Return to Dashboard
            </a>
            <a href="javascript:history.back()" class="block text-sm text-gray-500 hover:text-gray-700">Go Back</a>
        </div>
    </div>
</div>
{% endblock %}
