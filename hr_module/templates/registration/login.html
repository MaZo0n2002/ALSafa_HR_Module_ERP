<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Al Safa HR System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f71ff',
                        'primary-dark': '#3b5bcc',
                        dark: '#1a1a1a',
                        light: '#f4f6f9',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f6f9; }
    </style>
</head>
<body class="flex h-screen items-center justify-center">
    <div class="w-full max-w-md bg-white p-8 rounded-lg shadow-md">
        <div class="flex justify-center mb-6">
            <div class="flex items-center gap-3">
                <svg width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M 20 50 L 50 50 L 50 30 L 30 30 L 15 40 Z" fill="#4f71ff"/>
                    <path d="M 80 50 L 50 50 L 50 70 L 70 70 L 85 60 Z" fill="#4f71ff"/>
                    <rect x="25" y="60" width="25" height="15" rx="4" fill="#4f71ff"/>
                    <rect x="50" y="25" width="25" height="15" rx="4" fill="#4f71ff"/>
                </svg>
                <div>
                    <h1 class="text-xl font-extrabold text-dark tracking-tight leading-none">AL SAFA</h1>
                    <p class="text-[0.6rem] font-semibold text-gray-500 uppercase tracking-widest leading-none mt-1">HR System</p>
                </div>
            </div>
        </div>

        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Sign In</h2>

        {% if form.errors %}
        <div class="bg-red-50 text-red-600 p-3 rounded text-sm mb-4">
            {% for error in form.non_field_errors %}
                {{ error }}
            {% empty %}
                Your username and password didn't match. Please try again.
            {% endfor %}
        </div>
        {% endif %}

        <form method="post" action="" class="space-y-4">
            {% csrf_token %}
            <!-- CSRF Debug: {{ csrf_token }} -->
            <div>
                <label for="id_username" class="block text-sm font-medium text-gray-700">Email Address</label>
                <input type="email" name="username" id="id_username" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm border p-2">
            </div>
            <div>
                <label for="id_password" class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" name="password" id="id_password" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm border p-2">
            </div>
            
            <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
                Sign in
            </button>
        </form>

    </div>
</body>
</html>
