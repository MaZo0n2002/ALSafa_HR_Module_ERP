{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto py-8">
    <div class="bg-white shadow sm:rounded-lg">
        <div class="px-4 py-5 sm:p-6">
            <h3 class="text-lg leading-6 font-bold text-gray-900 uppercase tracking-wider">Bulk Import Leave Requests</h3>
            <div class="mt-2 max-w-xl text-sm text-gray-500">
                <p>Upload an Excel file to record multiple leaves at once. This will automatically approve the leaves and update employee statuses.</p>
            </div>
            
            <form action="{% url 'leaves:bulk_import' %}" method="POST" enctype="multipart/form-data" class="mt-8 space-y-6">
                {% csrf_token %}
                
                <div class="flex items-center justify-center w-full">
                    <label for="excel_file" class="flex flex-col items-center justify-center w-full h-64 border-2 border-gray-300 border-dashed rounded-lg cursor-pointer bg-gray-50 hover:bg-gray-100">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <svg class="w-8 h-8 mb-4 text-gray-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 16">
                                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 13h3a3 3 0 0 0 0-6h-.025A5.56 5.56 0 0 0 16 6.5 5.5 5.5 0 0 0 5.207 5.021C5.137 5.017 5.071 5 5 5a4 4 0 0 0 0 8h2.167M10 15V6m0 0L8 8m2-2 2 2"/>
                            </svg>
                            <p class="mb-2 text-sm text-gray-500"><span class="font-semibold">Click to upload</span> or drag and drop</p>
                            <p class="text-xs text-gray-400">Excel (.xlsx or .xls)</p>
                        </div>
                        <input id="excel_file" name="excel_file" type="file" class="hidden" accept=".xlsx, .xls" required />
                    </label>
                </div>

                <div class="flex items-center justify-between bg-blue-50 p-4 rounded-md">
                    <div class="flex items-center">
                        <svg class="h-5 w-5 text-blue-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <span class="text-sm text-blue-700 font-medium">Need the format?</span>
                    </div>
                    <a href="{% url 'leaves:download_template' %}" class="text-sm font-bold text-blue-700 hover:text-blue-800 underline">Download Template</a>
                </div>

                <div class="flex justify-end space-x-3">
                    <a href="{% url 'leaves:list' %}" class="inline-flex items-center px-4 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                        Cancel
                    </a>
                    <button type="submit" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-primary hover:bg-primary-dark">
                        Start Import
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
