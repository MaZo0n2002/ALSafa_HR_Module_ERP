{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded shadow">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Create New User</h2>
    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div class="space-y-2">
            {{ form.as_p }}
        </div>
        <div class="flex justify-end pt-4 space-x-3">
            <a href="{% url 'accounts:admin_dashboard' %}" class="bg-gray-100 text-gray-600 px-6 py-2 rounded hover:bg-gray-200 transition">Cancel</a>
            <button type="submit" class="bg-primary text-white px-6 py-2 rounded shadow hover:bg-primary-dark transition">Create User</button>
        </div>
    </form>
</div>
{% endblock %}
